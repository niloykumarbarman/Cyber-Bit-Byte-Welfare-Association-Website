name: Production Deploy and Monitor

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl, sqlite, pdo_mysql

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: PHP syntax check
        run: find app routes tests -name "*.php" -type f -exec php -l {} +

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit

      - name: Run PHP code style check
        run: ./vendor/bin/pint --test

  deploy:
    needs: test-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v0.1.11
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/cyberbit/welfare.cyberbitbyte.com"
            cd "$DEPLOY_DIR"

            bash scripts/deploy.sh

  health-check:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Verify production health
        run: |
          set -euo pipefail
          HEALTH_CHECK_URL="https://welfare.cyberbitbyte.com/health"
          MAX_RETRIES=5
          RETRY_INTERVAL=10

          echo "Waiting for application health..."
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES"
            if curl -sf "$HEALTH_CHECK_URL" > /dev/null 2>&1; then
              echo "✓ Health endpoint passed"
              exit 0
            fi
            sleep $RETRY_INTERVAL
          done
          echo "✗ Health check did not pass"
          exit 1
